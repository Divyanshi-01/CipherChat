spring:
  application:
    name: cipherchat-frontend

  server:
    port: 8081

  thymeleaf:
    cache: false
    mode: HTML
    enabled: true

server:
  port: 8081
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.p2p.messaging: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
